apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()
def hostArch = System.getProperty("os.arch", "").toLowerCase()
def useSourceBundleHermesForHost = (findProperty('shelly.useSourceBundleHermes') ?: (hostArch == "aarch64" || hostArch == "arm64").toString()).toBoolean()
def lastManualAndroidVersionCode = 532
def fallbackAndroidVersionCode = lastManualAndroidVersionCode + 1
def resolveShellyAndroidVersionCode = {
    def envVersionCode = System.getenv("SHELLY_ANDROID_VERSION_CODE")
    if (envVersionCode != null && envVersionCode.isInteger()) {
        return Math.max(envVersionCode.toInteger(), fallbackAndroidVersionCode)
    }
    try {
        def gitCount = ["git", "rev-list", "--count", "HEAD"].execute(null, rootDir).text.trim()
        if (gitCount.isInteger()) {
            return Math.max(gitCount.toInteger(), fallbackAndroidVersionCode)
        }
    } catch (Exception ignored) {
        // Keep direct Gradle builds usable outside a full git checkout.
    }
    return fallbackAndroidVersionCode
}()

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    if (useSourceBundleHermesForHost) {
        // React Native ships hermesc as an x86_64 Linux binary. Device-local
        // arm64 builds still need Hermes packaged, so emit a source bundle.
        hermesCommand = file("$projectRoot/scripts/hermesc-copy-bundle.sh").absolutePath
        hermesFlags = []
    } else {
        hermesCommand = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/linux64-bin/hermesc"
    }
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"

    /* Folders */
     //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]

    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

// Expo autolinking emits expo-notifications modules, but its channel provider
// is still registered through the legacy Package list.
def expoLegacyPackages = [
    "new expo.modules.constants.ConstantsPackage()",
    "new expo.modules.filesystem.legacy.FileSystemPackage()",
    "new expo.modules.keepawake.KeepAwakePackage()",
    "new expo.modules.linking.ExpoLinkingPackage()",
    "new expo.modules.localization.LocalizationPackage()",
    "new expo.modules.navigationbar.NavigationBarPackage()",
    "new expo.modules.notifications.NotificationsPackage()",
    "new expo.modules.systemui.SystemUIPackage()",
    "new expo.modules.updates.UpdatesPackage()",
]

def patchExpoLegacyPackageList = {
    def expoProject = rootProject.findProject(":expo")
    if (expoProject == null) {
        return
    }

    def packageListFile = expoProject.file("build/generated/expo/src/main/java/expo/modules/ExpoModulesPackageList.java")
    if (!packageListFile.exists()) {
        throw new GradleException("Expo package list was not generated at ${packageListFile}")
    }

    def source = packageListFile.getText("UTF-8")
    def missingPackages = expoLegacyPackages.findAll { !source.contains(it) }
    if (missingPackages.isEmpty()) {
        return
    }

    def marker = "static final List<Package> packagesList = Arrays.<Package>asList("
    def start = source.indexOf(marker)
    def end = start >= 0 ? source.indexOf("\n    );", start) : -1
    if (start < 0 || end < 0) {
        throw new GradleException("Could not patch Expo legacy packages in ${packageListFile}")
    }

    def bodyStart = start + marker.length()
    def existingBody = source.substring(bodyStart, end)
    def packageBlock = missingPackages.join(",\n      ")
    def patchedBody = existingBody.trim().isEmpty() ?
        "\n      ${packageBlock}" :
        "${existingBody.stripTrailing()},\n      ${packageBlock}"

    packageListFile.setText(source.substring(0, bodyStart) + patchedBody + source.substring(end), "UTF-8")
}

gradle.projectsEvaluated {
    def expoProject = rootProject.findProject(":expo")
    if (expoProject == null) {
        return
    }

    def patchTask = expoProject.tasks.register("patchShellyExpoLegacyPackageList") {
        dependsOn(expoProject.tasks.named("generatePackagesList"))
        outputs.upToDateWhen { false }
        doLast {
            patchExpoLegacyPackageList()
        }
    }

    expoProject.tasks.matching { it.name.endsWith("JavaWithJavac") }.configureEach {
        dependsOn(patchTask)
        outputs.upToDateWhen { false }
    }
}

def reactAndroidReleaseAarProvider = providers.provider {
    def candidates = fileTree("${gradle.gradleUserHomeDir}/caches/modules-2/files-2.1/com.facebook.react/react-android/0.81.5") {
        include "**/react-android-0.81.5-release.aar"
    }.files.toList()
    candidates.isEmpty() ? null : candidates.sort { it.absolutePath }.last()
}
def repairReactAndroidPrefabLinks = {
    def transformsDir = file("${gradle.gradleUserHomeDir}/caches/${gradle.gradleVersion}/transforms")
    def reactAndroidReleaseAar = reactAndroidReleaseAarProvider.getOrNull()
    if (!transformsDir.exists()) {
        return
    }
    if (reactAndroidReleaseAar == null || !reactAndroidReleaseAar.exists()) {
        throw new GradleException("Could not find react-android 0.81.5 release AAR in Gradle cache")
    }

    def restored = 0
    def stream = java.nio.file.Files.walk(transformsDir.toPath())
    try {
        stream.each { link ->
            def normalized = link.toString()
            def prefabRoot = "/react-android-0.81.5-release/"
            if (!normalized.endsWith(".so") ||
                !normalized.contains("${prefabRoot}prefab/modules/")) {
                return
            }
            if (!java.nio.file.Files.isSymbolicLink(link) || java.nio.file.Files.exists(link)) {
                return
            }

            def target = java.nio.file.Files.readSymbolicLink(link)
            if (!target.isAbsolute()) {
                target = link.parent.resolve(target)
            }

            def zipPath = normalized.substring(normalized.indexOf(prefabRoot) + prefabRoot.length())
            def entry = zipTree(reactAndroidReleaseAar).matching { include zipPath }.singleFile
            java.nio.file.Files.createDirectories(target.parent)
            java.nio.file.Files.copy(entry.toPath(), target, java.nio.file.StandardCopyOption.REPLACE_EXISTING)
            restored++
        }
    } finally {
        stream.close()
    }
    if (restored > 0) {
        logger.lifecycle("Restored ${restored} React Android prefab symlink target(s) for proot link2symlink builds.")
    }
}

gradle.projectsEvaluated {
    def repairTask = rootProject.tasks.register("repairShellyReactAndroidPrefabLinks") {
        outputs.upToDateWhen { false }
        doLast {
            repairReactAndroidPrefabLinks()
        }
    }

    allprojects {
        tasks.matching { it.name.startsWith("buildCMake") || it.name.startsWith("configureCMake") }.configureEach {
            dependsOn(repairTask)
        }
    }
}

/**
 * Set this to true in release builds to optimize the app using [R8](https://developer.android.com/topic/performance/app-optimization/enable-app-optimization).
 */
def enableMinifyInReleaseBuilds = (findProperty('android.enableMinifyInReleaseBuilds') ?: false).toBoolean()

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'dev.shelly.terminal'
    defaultConfig {
        applicationId 'dev.shelly.terminal'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolveShellyAndroidVersionCode
        versionName "5.3.2"

        buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            def enableShrinkResources = findProperty('android.enableShrinkResourcesInReleaseBuilds') ?: 'false'
            shrinkResources enableShrinkResources.toBoolean()
            minifyEnabled enableMinifyInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            def enablePngCrunchInRelease = findProperty('android.enablePngCrunchInReleaseBuilds') ?: 'true'
            crunchPngs enablePngCrunchInRelease.toBoolean()
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
// Accepts values in comma delimited lists, example:
// android.packagingOptions.pickFirsts=/LICENSE,**/picasa.ini
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    // Split option: 'foo,bar' -> ['foo', 'bar']
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    // Trim all elements in place.
    for (i in 0..<options.size()) options[i] = options[i].trim();
    // `[] - ""` is essentially `[""].filter(Boolean)` removing all empty strings.
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        // Ex: android.packagingOptions.pickFirsts += '**/SCCS/**'
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    implementation(project(":expo"))
    implementation(project(":expo-modules-core"))
    implementation(project(":react-native-async-storage_async-storage"))
    implementation(project(":react-native-gesture-handler"))
    implementation(project(":react-native-reanimated"))
    implementation(project(":react-native-safe-area-context"))
    implementation(project(":react-native-screens"))
    implementation(project(":react-native-svg"))
    implementation(project(":react-native-webview"))
    implementation(project(":react-native-worklets"))
    implementation("androidx.core:core-splashscreen:1.0.1")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
